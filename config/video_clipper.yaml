log_level: INFO
log_console: false

subtitle:
  model_name: large-v3
  device: auto
  compute_type: auto
  language: zh
  batch_size: 16
  align: true
  return_char_alignments: false

output:
  timestamp_format:
  include_header: false
  write_word_json: true
  word_json_suffix: _words

segmentation:
  percentile: 95
  output_suffix: _duration

video_split:
  ffmpeg_path: ffmpeg
  ffprobe_path: ffprobe
  output_extension:
  overwrite: true
  copy_codecs: true
  reencode_with_source_codecs: true
  output_encoding_args: []
  index_width: 3
  max_text_length: 80
